<!-- Create a Student Registration Form using HTML. Include fields for username, email, gender selection using radio buttons, course selection using checkboxes, and a submit button. -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>

<body>

    <h1>Student Registration Form</h1>

    <form action="">

        <div>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="Enter your username">
        </div>

        <br>

        <div>
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="Enter your email">
        </div>

        <br>

        <div>
            <p><strong>Gender:</strong></p>

            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>

            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Other</label>
        </div>

        <br>

        <div>
            <p><strong>Select Courses:</strong></p>

            <input type="checkbox" id="html" name="course" value="HTML">
            <label for="html">HTML</label>

            <input type="checkbox" id="css" name="course" value="CSS">
            <label for="css">CSS</label>

            <input type="checkbox" id="javascript" name="course" value="JavaScript">
            <label for="javascript">JavaScript</label>

            <input type="checkbox" id="python" name="course" value="Python">
            <label for="python">Python</label>
        </div>

        <br>

        <div>
            <label for="message">Why do you want to learn programming?</label>
            <br><br>
            <textarea id="message" name="message" rows="5" cols="40" placeholder="Write your answer here..."></textarea>
        </div>

        <br>

        <button type="submit">Register</button>

    </form>

</body>

</html>
